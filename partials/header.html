<script>
(function() {
  var toggle = document.getElementById('kj-nav-toggle');
  var menu = document.getElementById('kj-nav-menu');
  if (!toggle || !menu) return;

  toggle.addEventListener('click', function() {
    var expanded = toggle.getAttribute('aria-expanded') === 'true';
    toggle.setAttribute('aria-expanded', String(!expanded));
    toggle.classList.toggle('is-active');
    menu.classList.toggle('is-open');
  });

  // Close on resize to desktop
  window.addEventListener('resize', function() {
    if (window.innerWidth >= 992) {
      toggle.setAttribute('aria-expanded', 'false');
      toggle.classList.remove('is-active');
      menu.classList.remove('is-open');
    }
  });

  // Desktop hover dropdowns
  document.querySelectorAll('.kj-mega-dropdown').forEach(function(item) {
    var link = item.querySelector('.kj-nav__link');
    var panel = item.querySelector('.kj-megamenu');
    if (!link || !panel) return;

    item.addEventListener('mouseenter', function() {
      if (window.innerWidth >= 992) panel.classList.add('is-open');
    });
    item.addEventListener('mouseleave', function() {
      if (window.innerWidth >= 992) panel.classList.remove('is-open');
    });
    link.addEventListener('click', function(e) {
      if (window.innerWidth < 992) {
        e.preventDefault();
        panel.classList.toggle('is-open');
      }
    });
  });

  // Rate dropdown
  document.querySelectorAll('.kj-dropdown').forEach(function(dd) {
    var btn = dd.querySelector('.kj-dropdown__toggle');
    var menu = dd.querySelector('.kj-dropdown__menu');
    if (!btn || !menu) return;
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var expanded = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!expanded));
      menu.classList.toggle('is-open');
    });
    document.addEventListener('click', function() {
      btn.setAttribute('aria-expanded', 'false');
      menu.classList.remove('is-open');
    });
  });
})();
</script>
